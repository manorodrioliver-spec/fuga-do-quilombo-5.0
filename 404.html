<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // SPA redirect trick for GitHub Pages
      // Redirects 404s back to index.html preserving the path
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(
        '/' + window.location.pathname.split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (search ? '&' + search.slice(1).replace(/&/g, '~and~') : '') +
        hash
      );
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
